# librelane/macros/macros_5v.yaml
#
# The five mandatory wafer.space tapeout-IP macro placements (5 V variant).
#
# SRAM-FREE SCAFFOLD: there is intentionally NO SRAM macro here and NO
# PDN_MACRO_CONNECTIONS block. The upstream wafer.space template declares a
# gf180mcu_fd_ip_sram__sram512x8m8wm1 macro (with matching SRAM PDN grids in
# pdn/pdn_5v_sram.tcl); a design that has no SRAM in its netlist must NOT name
# those instances, or OpenROAD.GeneratePDN fails hard with
#   [PDN-1030] Unable to find instance i_chip_core.sram_0
# A macro definition (or PDN grid) that names an instance the netlist does not
# contain is a build-stopping error, not a warning. If you later instantiate an
# SRAM macro, restore the SRAM macro block here, the matching
# PDN_MACRO_CONNECTIONS entries, AND the SRAM PDN source in pdn/pdn_cfg.tcl — the
# three must always travel together.
#
# The QR/ID/marker GDS/LEF/lib/vh shipped under ../ip are generic PLACEHOLDERS so
# the flow runs end to end. Replace them with the wafer.space-issued cells for
# your registered project before a real tapeout (see ../ip/README.md).

MACROS:
  # required: will be replaced with actual content
  gf180mcu_ws_ip__qrcode_id:
    gds:
      - dir::../ip/gf180mcu_ws_ip__qrcode_id/gds/gf180mcu_ws_ip__qrcode_id.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__qrcode_id/lef/gf180mcu_ws_ip__qrcode_id.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__qrcode_id/vh/gf180mcu_ws_ip__qrcode_id.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__qrcode_id/lib/gf180mcu_ws_ip__qrcode_id.lib
    instances:
      qrcode_id:
        location: [26, 26]
        orientation: N

  # required: will be replaced with actual content
  gf180mcu_ws_ip__shuttle_id:
    gds:
      - dir::../ip/gf180mcu_ws_ip__shuttle_id/gds/gf180mcu_ws_ip__shuttle_id.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__shuttle_id/lef/gf180mcu_ws_ip__shuttle_id.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__shuttle_id/vh/gf180mcu_ws_ip__shuttle_id.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__shuttle_id/lib/gf180mcu_ws_ip__shuttle_id.lib
    instances:
      shuttle_id:
        location: [26, 175.6]
        orientation: E

  # required: will be replaced with actual content
  gf180mcu_ws_ip__project_id:
    gds:
      - dir::../ip/gf180mcu_ws_ip__project_id/gds/gf180mcu_ws_ip__project_id.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__project_id/lef/gf180mcu_ws_ip__project_id.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__project_id/vh/gf180mcu_ws_ip__project_id.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__project_id/lib/gf180mcu_ws_ip__project_id.lib
    instances:
      project_id:
        location: [175.6, 26]
        orientation: N

  # required: top right corner marker
  gf180mcu_ws_ip__marker:
    gds:
      - dir::../ip/gf180mcu_ws_ip__marker/gds/gf180mcu_ws_ip__marker.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__marker/lef/gf180mcu_ws_ip__marker.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__marker/vh/gf180mcu_ws_ip__marker.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__marker/lib/gf180mcu_ws_ip__marker.lib
    instances:
      marker:
        location: ["expr::($DIE_AREA[2] - (245 + 36))", "expr::($DIE_AREA[3] - (245 + 36))"]
        orientation: N

  # optional: the wafer.space logo (decorative, may be removed)
  gf180mcu_ws_ip__logo:
    gds:
      - dir::../ip/gf180mcu_ws_ip__logo/gds/gf180mcu_ws_ip__logo.gds
    lef:
      - dir::../ip/gf180mcu_ws_ip__logo/lef/gf180mcu_ws_ip__logo.lef
    vh:
      - dir::../ip/gf180mcu_ws_ip__logo/vh/gf180mcu_ws_ip__logo.v
    lib:
      "*":
        - dir::../ip/gf180mcu_ws_ip__logo/lib/gf180mcu_ws_ip__logo.lib
    instances:
      wafer_space_logo:
        location: [26, "expr::$DIE_AREA[3] - 169.25"]
        orientation: N
